version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oxquant-postgres
    environment:
      POSTGRES_DB: oxquant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxquant-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: oxquant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxquant-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: oxquant-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/oxquant
      - REDIS_URL=redis://redis:6379/0
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./poetry.lock:/app/poetry.lock
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - oxquant-network

  # Web Dashboard
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: oxquant-web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./src/ui:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    command: npm start
    networks:
      - oxquant-network

  # Jupyter Notebooks
  jupyter:
    image: jupyter/datascience-notebook:latest
    container_name: oxquant-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/src
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=oxquant
    command: start-notebook.sh --NotebookApp.token='oxquant'
    networks:
      - oxquant-network

volumes:
  postgres_data:
  redis_data:

networks:
  oxquant-network:
    driver: bridge